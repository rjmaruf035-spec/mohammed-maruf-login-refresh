<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed-X | Premium Hotspot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle, #1a1a1a, #0d0d0d); /* মেট ব্ল্যাক ইফেক্ট */
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
        }

        .container {
            background: #222;
            width: 85%;
            max-width: 380px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
        }

        h1 {
            font-size: 32px;
            letter-spacing: 3px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #007bff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 12px;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #007bff, #0056b3);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        .info-panel {
            margin-top: 30px;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            color: #00d4ff;
        }

        .info-row span {
            margin-left: 8px;
            color: #ccc;
        }

        .contact-box {
            margin-top: 25px;
            font-size: 14px;
        }

        .contact-box a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        .footer {
            margin-top: 15px;
            font-size: 10px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SPEED-X</h1>
    <div class="tagline">PREMIUM INTERNET ABU DHABI</div>

    <form action="login" method="post">
        <input type="text" name="username" placeholder="VOUCHER CODE" required>
        <button type="submit">ACTIVATE ACCESS</button>
    </form>

    <div class="info-panel">
        <div class="info-row">✔ <span>Ultra-Fast Stable Speed</span></div>
        <div class="info-row">✔ <span>No VPN Needed for Calls</span></div>
        <div class="info-row">✔ <span>24/7 Priority Support</span></div>
    </div>

    <div class="contact-box">
        For Vouchers, WhatsApp:<br>
        <a href="tel:0525018852">0525018852</a>
    </div>

    <div class="footer">
        Powered by Maruf Network Solutions
    </div>
</div>

</body>
</html>
